name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  server:
    name: Server — lint, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type-check
        run: bun run lint

      - name: Validate GraphQL SDL
        run: bun run check:schema

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

  client:
    name: Client — lint, test, relay, build
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: Generate Relay artifacts
        run: bun run relay

      - name: Type-check
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Test stories
        run: bun run test-storybook

      - name: Build Storybook
        run: bun run build-storybook

      - name: Build
        run: bun run build

      # Each PR gets its own stable subdomain — no conflicts between concurrent PRs.
      - name: Deploy bundle report (PR)
        if: github.event_name == 'pull_request'
        env:
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: bunx surge dist/stats.html tvke-pr-${{ github.event.pull_request.number }}.surge.sh --token $SURGE_TOKEN

      - name: Comment bundle report link on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const url = `https://tvke-pr-${prNumber}.surge.sh`;
            const marker = '<!-- bundle-report -->';
            const body = [marker, '## Bundle Report', '', `[View interactive bundle report](${url})`].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

      # Keep a stable post-merge report at a fixed URL.
      - name: Deploy bundle report (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: bunx surge dist/stats.html tvke-bundle.surge.sh --token $SURGE_TOKEN
